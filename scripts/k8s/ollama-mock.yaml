# Ollama mock for acceptance tests.
#
# The Archestra backend's `testProviderApiKey` flow probes the Ollama
# provider's `/v1/models` endpoint when validating LLM provider keys. Without
# a reachable Ollama, BYOS-vault tests for Ollama keys fail. This stub returns
# a static, OpenAI-compatible model list so validation passes.
#
# Applied by scripts/bootstrap-ollama-mock.sh. Same manifest is used by CI and
# any Kind-based local cluster (.github/workflows/on-pull-request.yml +
# .github/values-ci.yaml point ARCHESTRA_OLLAMA_BASE_URL at this service).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-mock
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-mock
  template:
    metadata:
      labels:
        app: ollama-mock
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:11434"
            - '-text={"object":"list","data":[{"id":"llama3","object":"model","created":1700000000,"owned_by":"ci-stub"}]}'
          ports:
            - containerPort: 11434
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-mock
  namespace: default
spec:
  selector:
    app: ollama-mock
  ports:
    - port: 11434
      targetPort: 11434
