name: On Pull Requests

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: read

concurrency:
  # Cancel any running workflow for the same branch when new commits are pushed.
  # We group both by ref_name (available when CI is triggered by a push to a branch/tag)
  # and head_ref (available when CI is triggered by a PR).
  # For merge queue, we use merge_group to ensure each merge queue run gets its own group.
  group: "on-pull-requests-${{ github.ref_name }}-${{ github.head_ref }}-${{ github.event.merge_group.head_sha || '' }}"
  cancel-in-progress: true

jobs:
  lint-pr-title:
    name: PR Title Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Lint PR title
        uses: grafana/shared-workflows/actions/lint-pr-title@19d8fb5687bb386849f7f53673c5f429e6387cf5 # v1.2.0
        with:
          config-path: "${{ github.workspace }}/.github/commitlint.config.js"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linting-and-tests:
    name: Linting and Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup go
        uses: ./.github/actions/setup-go

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      - name: Ensure go mod is "tidy"
        run: |
          go mod tidy -diff
          cd tools && go mod tidy -diff

      - name: Linting
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.11

      - name: Ensure formatting and generation are up to date
        run: |
          make fmt
          make generate

          if ! git diff --exit-code; then
            echo "🔴🔴🔴: There are uncommitted changes. Please run 'make lint', 'make fmt', and 'make generate' and commit the changes. 🔴🔴🔴"
            exit 1
          fi

      - name: Unit Tests
        run: make test

      - name: Build
        run: make build

  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Archestra platform version for acceptance tests
      # Update this single value to bump the version used
      ARCHESTRA_VERSION: "1.2.20"
    steps:
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup go
        uses: ./.github/actions/setup-go

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform

      # Deploy Archestra Platform locally using Kind
      # This uses the pre-built archestra/platform image from Docker Hub and the published Helm chart from GAR
      - name: Setup Archestra Platform
        uses: archestra-ai/archestra/.github/actions/setup-archestra-platform@ab0c93762d005ccb9475d883c4a47970f480bf5b # v1.0.8
        with:
          kind-config-path: ./.github/kind.yaml
          kind-cluster-name: archestra-ci-cluster
          helm-values-path: ./.github/values-ci.yaml
          helm-chart-ref: oci://europe-west1-docker.pkg.dev/friendly-path-465518-r6/archestra-public/helm-charts/archestra-platform:${{ env.ARCHESTRA_VERSION }}
          deploy-e2e-dependencies: "false"
          build-platform-image: "false"
          platform-image-tag: archestra/platform:${{ env.ARCHESTRA_VERSION }}

      # Stub /v1/models so backend's testProviderApiKey passes without a real
      # Ollama. Manifest + apply logic shared with local development via
      # scripts/bootstrap-ollama-mock.sh and scripts/k8s/ollama-mock.yaml.
      - name: Deploy Ollama mock
        run: ./scripts/bootstrap-ollama-mock.sh

      # Dev-mode Vault + secret seed for BYOS tests. Ephemeral; do not mirror
      # outside CI. Shared with local via scripts/bootstrap-vault.sh and
      # scripts/k8s/vault-dev.yaml.
      - name: Deploy Vault (dev mode)
        run: ./scripts/bootstrap-vault.sh

      - name: Check for codegen'd API client changes
        run: |
          make codegen-api-client

          if ! git diff --exit-code; then
            echo "::error::Generated API client code is not up to date. Please run 'make codegen-api-client' locally and commit the changes."
            exit 1
          fi

      # Sign in with default seeded credentials (admin@example.com / password)
      # and create a fresh API key. Logic is shared with local development via
      # scripts/bootstrap-api-key.sh — keep the script and this step in sync.
      - name: Obtain API Key
        id: api-key
        env:
          ARCHESTRA_BASE_URL: http://localhost:9000
        run: |
          API_KEY=$(./scripts/bootstrap-api-key.sh)
          echo "::add-mask::${API_KEY}"
          echo "api-key=${API_KEY}" >> "$GITHUB_OUTPUT"

      # Provision a throwaway OIDC identity provider so the enterprise_managed_config
      # acceptance test can exercise the full EMC round-trip. The test skips gracefully
      # if ARCHESTRA_TEST_IDP_ID is unset; in CI we always set it.
      - name: Provision test Identity Provider
        id: test-idp
        env:
          ARCHESTRA_BASE_URL: http://localhost:9000
          ARCHESTRA_API_KEY: ${{ steps.api-key.outputs.api-key }}
        run: |
          IDP_ID=$(./scripts/bootstrap-test-idp.sh)
          echo "idp-id=${IDP_ID}" >> "$GITHUB_OUTPUT"

      - name: Run Acceptance Tests
        run: make testacc
        env:
          ARCHESTRA_BASE_URL: "http://localhost:9000"
          ARCHESTRA_API_KEY: ${{ steps.api-key.outputs.api-key }}
          ARCHESTRA_TEST_IDP_ID: ${{ steps.test-idp.outputs.idp-id }}
          ARCHESTRA_READONLY_VAULT_ENABLED: "true"
